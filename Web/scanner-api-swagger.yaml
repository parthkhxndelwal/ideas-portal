openapi: 3.0.3
info:
  title: Scanner React Native API
  description: |
    Offline-first QR scanner API designed for minimal internet usage with batch processing, 
    delta sync, and conflict resolution capabilities.
    
    ## Key Features
    - Offline-first architecture
    - Idempotency support
    - Delta sync for efficient data transfer
    - Conflict resolution
    - JWT-based authentication
    - Batch processing (max 100 entries)
    
    ## Authentication
    Most endpoints require Bearer token authentication obtained from device registration.
    Format: `Authorization: Bearer <jwt_token>`
    
  version: 1.0.0
  contact:
    name: Ideas Portal Team
  license:
    name: Internal Use Only

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://your-domain.com/api
    description: Production server

tags:
  - name: Scanner Device
    description: Scanner device management endpoints
  - name: Scanner Operations
    description: Core scanner operations for React Native app
  - name: Admin - Scanner
    description: Admin endpoints for scanner management
  - name: Health
    description: Health check and monitoring endpoints

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: |
        Basic health check endpoint for monitoring service availability.
        Returns service status, uptime, and basic system information.
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                    description: Current server timestamp
                    example: "2025-10-23T10:30:00.000Z"
                  uptime:
                    type: number
                    description: Server uptime in seconds
                    example: 3600.5
                  version:
                    type: string
                    description: "1.0.0"
                  service:
                    type: string
                    description: Service name
                    example: "Ideas Portal API"
                  environment:
                    type: string
                    description: Environment (development/production)
                    example: "development"
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unhealthy]
                    example: "unhealthy"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-10-23T10:30:00.000Z"
                  error:
                    type: string
                    description: Error description
                    example: "Internal server error"
                  uptime:
                    type: number
                    example: 3600.5
                  version:
                    type: string
                    example: "1.0.0"
                  service:
                    type: string
                    example: "Ideas Portal API"
                  environment:
                    type: string
                    example: "development"
  /scanner-react/devices/register:
    post:
      tags:
        - Scanner Device
      summary: Register a new scanner device
      description: |
        Register a new scanner device and receive credentials for subsequent API calls.
        No authentication required. Store the returned deviceId and token securely.
      operationId: registerDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - location
                - appVersion
              properties:
                name:
                  type: string
                  description: Device name/identifier
                  example: "Scanner Device 1"
                location:
                  type: string
                  description: Physical location of the device
                  example: "Main Entrance"
                appVersion:
                  type: string
                  description: Mobile app version
                  example: "1.0.0"
      responses:
        '200':
          description: Device registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceId:
                    type: string
                    description: Unique device identifier
                    example: "DEVICE_abc123def456..."
                  token:
                    type: string
                    description: JWT authentication token (valid for 7 days)
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  syncIntervalSeconds:
                    type: integer
                    description: Recommended sync interval in seconds
                    example: 300
                  maxBatchSize:
                    type: integer
                    description: Maximum number of entries per batch upload
                    example: 100
        '400':
          description: Bad request - Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /scanner-react/registrations:
    get:
      tags:
        - Scanner Operations
      summary: Fetch participant registrations
      description: |
        Download confirmed participant registrations for offline validation.
        Supports delta sync using the 'since' parameter to fetch only updated records.
        
        **Usage:**
        - First call: Omit 'since' parameter to download all registrations
        - Subsequent calls: Use 'lastSyncAt' from previous response as 'since' parameter
      operationId: getRegistrations
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          description: ISO 8601 timestamp. Returns only registrations updated after this time.
          required: false
          schema:
            type: string
            format: date-time
            example: "2025-10-22T10:30:00.000Z"
        - name: limit
          in: query
          description: Maximum number of results (1-1000)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            example: 500
      responses:
        '200':
          description: Registrations fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  lastSyncAt:
                    type: string
                    format: date-time
                    description: Server timestamp for next delta sync
                    example: "2025-10-22T10:35:00.000Z"
                  registrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Registration'
        '400':
          description: Bad request - Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid or inactive device token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /scanner-react/scans/batch:
    post:
      tags:
        - Scanner Operations
      summary: Upload batch of entry records
      description: |
        Upload a batch of scanned entries to the server. Maximum 100 entries per batch.
        
        **Features:**
        - Idempotency using client-generated scan IDs
        - Per-entry validation and status reporting
        - Conflict detection for duplicate entries
        - Comprehensive validation (user exists, payment completed, not blacklisted, etc.)
        
        **Status Codes:**
        - `accepted`: Entry successfully recorded
        - `conflict`: Entry already exists (duplicate scan)
        - `rejected`: Entry rejected (validation failed)
      operationId: uploadBatchScans
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deviceId
                - entries
              properties:
                deviceId:
                  type: string
                  description: Device ID (must match authenticated device)
                  example: "DEVICE_abc123def456..."
                entries:
                  type: array
                  maxItems: 100
                  items:
                    $ref: '#/components/schemas/BatchEntry'
      responses:
        '200':
          description: Batch processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  processedAt:
                    type: string
                    format: date-time
                    description: Server timestamp when batch was processed
                    example: "2025-10-22T14:35:00.000Z"
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/BatchResult'
        '400':
          description: Bad request - Invalid data or batch size exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid or inactive device token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Device ID mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /scanner-react/updates:
    get:
      tags:
        - Scanner Operations
      summary: Fetch server-side updates
      description: |
        Fetch entry updates made by other devices since last sync for conflict resolution.
        Use this endpoint to detect entries made by other devices and update local cache.
        
        **Usage:**
        - Call periodically (every 5 minutes recommended)
        - Use 'lastSyncAt' from previous response as next 'since' parameter
        - Updates exclude entries from the requesting device
      operationId: getUpdates
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          description: ISO 8601 timestamp. Returns entries created after this time.
          required: true
          schema:
            type: string
            format: date-time
            example: "2025-10-22T10:00:00.000Z"
      responses:
        '200':
          description: Updates fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  lastSyncAt:
                    type: string
                    format: date-time
                    description: Server timestamp for next update sync
                    example: "2025-10-22T15:00:00.000Z"
                  entryUpdates:
                    type: array
                    items:
                      $ref: '#/components/schemas/EntryUpdate'
        '400':
          description: Bad request - Missing or invalid 'since' parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid or inactive device token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/scanner-devices:
    get:
      tags:
        - Admin - Scanner
      summary: List all scanner devices
      description: |
        Admin endpoint to view all registered scanner devices with their statistics.
        Returns device information and scan statistics for each device.
      operationId: listScannerDevices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Scanner devices fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScannerDevice'
                  overallStatistics:
                    $ref: '#/components/schemas/ScanStatistics'
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags:
        - Admin - Scanner
      summary: Activate or deactivate a scanner device
      description: |
        Admin endpoint to enable or disable a scanner device.
        Deactivated devices cannot authenticate or perform any operations.
      operationId: updateScannerDevice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deviceId
                - isActive
              properties:
                deviceId:
                  type: string
                  description: Device ID to update
                  example: "DEVICE_abc123def456..."
                isActive:
                  type: boolean
                  description: Set device active status
                  example: true
      responses:
        '200':
          description: Device updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Device activated successfully"
                  deviceId:
                    type: string
                    example: "DEVICE_abc123def456..."
                  isActive:
                    type: boolean
                    example: true
        '400':
          description: Bad request - Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/scan-records:
    get:
      tags:
        - Admin - Scanner
      summary: View scan records
      description: |
        Admin endpoint to view all scan records with filtering and pagination.
        Supports filtering by device, status, and roll number.
      operationId: getScanRecords
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: query
          description: Filter by device ID
          required: false
          schema:
            type: string
            example: "DEVICE_abc123def456..."
        - name: status
          in: query
          description: Filter by scan status
          required: false
          schema:
            type: string
            enum: [accepted, conflict, rejected]
            example: "accepted"
        - name: rollNumber
          in: query
          description: Filter by roll number
          required: false
          schema:
            type: string
            example: "2021BCS001"
        - name: limit
          in: query
          description: Number of results per page (default 50)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            example: 50
        - name: page
          in: query
          description: Page number (default 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
      responses:
        '200':
          description: Scan records fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  scans:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScanRecord'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from device registration or admin login.
        For scanner devices, use token from `/scanner-react/devices/register`.
        For admin endpoints, use admin JWT token.

  schemas:
    Registration:
      type: object
      properties:
        _id:
          type: string
          description: User ID
          example: "507f1f77bcf86cd799439011"
        email:
          type: string
          format: email
          example: "student@example.com"
        role:
          type: string
          enum: [participant, admin]
          example: "participant"
        isEmailVerified:
          type: boolean
          example: true
        rollNumber:
          type: string
          example: "2021BCS001"
        name:
          type: string
          example: "John Doe"
        courseAndSemester:
          type: string
          example: "B.Tech CSE - 7"
        year:
          type: string
          example: "4th Year"
        registrationStatus:
          type: string
          enum: [pending, details_confirmed, confirmed]
          example: "confirmed"
        transactionId:
          type: string
          example: "TXN1234567890"
        paymentStatus:
          type: string
          enum: [pending, completed]
          example: "completed"
        createdAt:
          type: string
          format: date-time
          example: "2025-10-20T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-10-21T15:30:00.000Z"

    BatchEntry:
      type: object
      required:
        - _id
        - rollNumber
        - name
        - qrType
        - entryDate
        - entryTimestamp
        - scannedBy
        - createdAt
      properties:
        _id:
          type: string
          description: Client-generated unique scan ID (for idempotency)
          example: "LOCAL_SCAN_001"
        rollNumber:
          type: string
          example: "2021BCS001"
        name:
          type: string
          example: "John Doe"
        qrType:
          type: string
          enum: [participant, volunteer]
          example: "participant"
        transactionId:
          type: string
          example: "TXN1234567890"
        entryDate:
          type: string
          format: date
          description: Entry date (date only, no time)
          example: "2025-10-22"
        entryTimestamp:
          type: string
          format: date-time
          description: Exact entry timestamp
          example: "2025-10-22T14:30:00.000Z"
        scannedBy:
          type: string
          description: Device ID that performed the scan
          example: "DEVICE_abc123def456..."
        createdAt:
          type: string
          format: date-time
          description: When the scan was created locally
          example: "2025-10-22T14:30:00.000Z"

    BatchResult:
      type: object
      properties:
        entryId:
          type: string
          description: The scan ID from the batch entry
          example: "LOCAL_SCAN_001"
        status:
          type: string
          enum: [accepted, conflict, rejected]
          description: Processing status
          example: "accepted"
        reason:
          type: string
          description: Reason for conflict or rejection
          example: "Entry already exists for this date"
        appliedAt:
          type: string
          format: date-time
          description: Server timestamp when entry was applied (only for accepted)
          example: "2025-10-22T14:35:00.000Z"

    EntryUpdate:
      type: object
      properties:
        rollNumber:
          type: string
          example: "2021BCS001"
        lastSeen:
          type: string
          format: date-time
          description: When this entry was last recorded
          example: "2025-10-22T14:30:00.000Z"
        sourceDeviceId:
          type: string
          description: Device ID that recorded the entry
          example: "DEVICE_xyz789..."

    ScannerDevice:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        deviceId:
          type: string
          example: "DEVICE_abc123def456..."
        name:
          type: string
          example: "Scanner Device 1"
        location:
          type: string
          example: "Main Entrance"
        appVersion:
          type: string
          example: "1.0.0"
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2025-10-22T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-10-22T10:00:00.000Z"
        statistics:
          $ref: '#/components/schemas/ScanStatistics'

    ScanStatistics:
      type: object
      properties:
        totalScans:
          type: integer
          description: Total number of scans
          example: 150
        acceptedScans:
          type: integer
          description: Number of accepted scans
          example: 120
        conflictScans:
          type: integer
          description: Number of conflicting scans
          example: 20
        rejectedScans:
          type: integer
          description: Number of rejected scans
          example: 10

    ScanRecord:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        scanId:
          type: string
          description: Client-generated unique scan ID
          example: "LOCAL_SCAN_001"
        deviceId:
          type: string
          example: "DEVICE_abc123def456..."
        rollNumber:
          type: string
          example: "2021BCS001"
        name:
          type: string
          example: "John Doe"
        qrType:
          type: string
          enum: [participant, volunteer]
          example: "participant"
        transactionId:
          type: string
          example: "TXN1234567890"
        entryDate:
          type: string
          format: date
          example: "2025-10-22"
        entryTimestamp:
          type: string
          format: date-time
          example: "2025-10-22T14:30:00.000Z"
        scannedBy:
          type: string
          example: "DEVICE_abc123def456..."
        status:
          type: string
          enum: [accepted, conflict, rejected]
          example: "accepted"
        reason:
          type: string
          example: "Entry already exists for this date"
        appliedAt:
          type: string
          format: date-time
          example: "2025-10-22T14:35:00.000Z"
        createdAt:
          type: string
          format: date-time
          example: "2025-10-22T14:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-10-22T14:35:00.000Z"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Results per page
          example: 50
        totalCount:
          type: integer
          description: Total number of records
          example: 250
        totalPages:
          type: integer
          description: Total number of pages
          example: 5

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Unauthorized - Invalid or inactive device token"
